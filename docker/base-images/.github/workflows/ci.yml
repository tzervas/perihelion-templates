name: Docker Base Images CI

on:
  push:
    branches: [ main ]
    paths:
      - 'docker/base-images/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'docker/base-images/**'

jobs:
  lint:
    name: Lint Dockerfiles
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Run Hadolint
      uses: hadolint/hadolint-action@v3.1.0
      with:
        dockerfile: docker/base-images/*/Dockerfile
        ignore: DL3008,DL3013,DL3016

  test:
    name: Test Images
    runs-on: ubuntu-latest
    needs: [lint]
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Run Tests
      working-directory: docker/base-images
      run: |
        chmod +x tests/test_base_images.sh
        ./tests/test_base_images.sh

  scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [test]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Build Python image
      uses: docker/build-push-action@v5
      with:
        context: docker/base-images/python
        push: false
        load: true
        tags: perihelion/python-base:test
    
    - name: Build Node.js image
      uses: docker/build-push-action@v5
      with:
        context: docker/base-images/node
        push: false
        load: true
        tags: perihelion/node-base:test
    
    - name: Build Java image
      uses: docker/build-push-action@v5
      with:
        context: docker/base-images/java
        push: false
        load: true
        tags: perihelion/java-base:test
    
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'image'
        image-ref: 'perihelion/python-base:test'
        format: 'table'
        exit-code: '1'
        ignore-unfixed: true
        vuln-type: 'os,library'
        severity: 'CRITICAL,HIGH'

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'image'
        image-ref: 'perihelion/node-base:test'
        format: 'table'
        exit-code: '1'
        ignore-unfixed: true
        vuln-type: 'os,library'
        severity: 'CRITICAL,HIGH'

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'image'
        image-ref: 'perihelion/java-base:test'
        format: 'table'
        exit-code: '1'
        ignore-unfixed: true
        vuln-type: 'os,library'
        severity: 'CRITICAL,HIGH'

  release:
    name: Release Images
    runs-on: ubuntu-latest
    needs: [scan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Build and push Python image
      uses: docker/build-push-action@v5
      with:
        context: docker/base-images/python
        push: true
        platforms: linux/amd64,linux/arm64
        tags: |
          ghcr.io/tzervas/python-base:latest
          ghcr.io/tzervas/python-base:1.0.0
    
    - name: Build and push Node.js image
      uses: docker/build-push-action@v5
      with:
        context: docker/base-images/node
        push: true
        platforms: linux/amd64,linux/arm64
        tags: |
          ghcr.io/tzervas/node-base:latest
          ghcr.io/tzervas/node-base:1.0.0
    
    - name: Build and push Java image
      uses: docker/build-push-action@v5
      with:
        context: docker/base-images/java
        push: true
        platforms: linux/amd64,linux/arm64
        tags: |
          ghcr.io/tzervas/java-base:latest
          ghcr.io/tzervas/java-base:1.0.0
