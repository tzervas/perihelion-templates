[package]
name = "rust-library-template"
version = "0.1.0"
edition = "2021"
authors = ["Tyler Zervas"]
license = "MIT"
description = "A template for creating secure Rust libraries"
repository = "https://github.com/tzervas/perihelion-templates"
documentation = "https://docs.rs/rust-library-template"
readme = "README.md"
keywords = ["template", "library"]
categories = ["development-tools"]

[lib]
name = "rust_library_template"
path = "src/lib.rs"

[dependencies]
thiserror = "1.0"
serde = { version = "1.0", features = ["derive"] }
tracing = "0.1"
zeroize = { version = "1.7", features = ["zeroize_derive"] }
cfg-if = "1.0"

[dev-dependencies]
criterion = "0.5"
test-case = "3.3"
mockall = "0.12"
proptest = "1.4"
rstest = "0.18"
serde_json = "1.0"
tempfile = "3.10"

[features]
default = []
alloc = []
std = ["alloc"]

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[profile.release]
lto = true
codegen-units = 1
strip = true
panic = "abort"

[profile.dev]
debug = true
panic = "unwind"

[[bench]]
name = "benchmarks"
harness = false
