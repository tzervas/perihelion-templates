name: Java Library CI

on:
  push:
    branches: [ main ]
    paths:
      - 'java/library/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'java/library/**'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Setup Gradle
      uses: gradle/gradle-build-action@v3
      
    - name: Run Spotless Check
      working-directory: java/library
      run: ./gradlew spotlessCheck
      
    - name: Build with Gradle
      working-directory: java/library
      run: ./gradlew build
      
    - name: Run Tests with Coverage
      working-directory: java/library
      run: ./gradlew test jacocoTestReport
      
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        directory: java/library/build/reports/jacoco/
        flags: java-library
        
    - name: Run Sonar Analysis
      working-directory: java/library
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: ./gradlew sonar
      
    - name: Upload Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: java/library/build/reports/tests/

    - name: Publish Security Results
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: java/library/build/reports/sarif
