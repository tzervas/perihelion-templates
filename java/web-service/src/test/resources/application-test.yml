spring:
  flyway:
    enabled: true

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

  security:
    jwt:
      secret-key: thisisatestkeythisisatestkeythisisatestkeythisisatestkey
      expiration: 3600000 # 1 hour
      refresh-token:
        expiration: 86400000 # 24 hours

logging:
  level:
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
