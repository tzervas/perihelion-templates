name: Go Library CI

on:
  push:
    branches: [ main ]
    paths:
      - 'go/library/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'go/library/**'

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'
        cache: true
        cache-dependency-path: go/library/go.sum

    - name: Install dependencies
      working-directory: go/library
      run: go mod download

    - name: Run vet
      working-directory: go/library
      run: go vet ./...

    - name: Run tests with coverage
      working-directory: go/library
      run: |
        go test -v -race -coverprofile=coverage.txt -covermode=atomic ./...
        go tool cover -func=coverage.txt

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: go/library/coverage.txt
        flags: go-library

  lint:
    name: Lint
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'
        cache: true

    - name: golangci-lint
      uses: golangci/golangci-lint-action@v4
      with:
        version: latest
        working-directory: go/library
        args: --timeout=5m

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test, lint]
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'
        cache: true

    - name: Build library
      working-directory: go/library
      run: go build -v ./...

    - name: Build example
      working-directory: go/library/cmd/validate
      run: |
        go build -v
        ./validate -help

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [build]
    
    steps:
    - uses: actions/checkout@v4

    - name: Run Snyk to check for vulnerabilities
      uses: snyk/actions/golang@master
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      with:
        args: --severity-threshold=high

    - name: Run gosec Security Scanner
      uses: securego/gosec@master
      with:
        args: go/library/...
