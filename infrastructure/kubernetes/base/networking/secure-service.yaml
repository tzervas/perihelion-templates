apiVersion: v1
kind: Service
metadata:
  name: secure-service
  namespace: default
  labels:
    app: secure-app
spec:
  selector:
    app: secure-app
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP
    name: http
  - port: 9090
    targetPort: 9090
    protocol: TCP
    name: metrics
  type: ClusterIP
