[defaults]
# Basic Configuration
inventory = inventory/sample-inventory.yml
host_key_checking = True
timeout = 30
forks = 10
poll_interval = 1
log_path = /var/log/ansible.log

# Security Settings
remote_user = ansible
private_key_file = ~/.ssh/ansible_key
ask_pass = False
ask_sudo_pass = False
ask_vault_pass = False

# SSH Security
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=yes -o UserKnownHostsFile=/etc/ssh/ssh_known_hosts
scp_if_ssh = True
control_path_dir = ~/.ansible/cp
pipelining = True

# Security Hardening
vault_password_file = ~/.ansible/vault_pass
vault_identity_list = default@~/.ansible/vault_pass
vault_encrypt_identity = default

# Privilege Escalation
become = True
become_method = sudo
become_user = root
become_ask_pass = False

# Performance and Reliability
gathering = smart
fact_caching = jsonfile
fact_caching_connection = /tmp/ansible_facts_cache
fact_caching_timeout = 3600
retry_files_enabled = True
retry_files_save_path = ~/.ansible/retry

# Output and Logging
stdout_callback = default
bin_ansible_callbacks = True
force_color = auto
nocows = 1
callback_whitelist = timer, profile_tasks, log_plays
display_skipped_hosts = False
display_ok_hosts = True

# Security Modules
action_warnings = True
command_warnings = True
deprecation_warnings = True
system_warnings = True
inventory_unparsed_warning = True

# Connection Settings
transport = smart
remote_port = 22
module_lang = C.UTF-8
module_set_locale = True

[inventory]
# Security for dynamic inventory
enable_plugins = auto, ini, yaml, script, host_list
cache = False
cache_plugin = memory
cache_timeout = 3600
unparsed_is_failed = True

[privilege_escalation]
become = True
become_method = sudo
become_user = root
become_ask_pass = False

[paramiko_connection]
record_host_keys = True
proxy_command = 

[ssh_connection]
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=yes
pipelining = True
timeout = 30
control_path = ~/.ansible/cp/%%h-%%p-%%r
control_path_dir = ~/.ansible/cp
retries = 3

[persistent_connection]
connect_timeout = 30
command_timeout = 60

[colors]
highlight = white
verbose = blue
warn = bright purple
error = red
debug = dark gray
deprecate = purple
skip = cyan
unreachable = red
ok = green
changed = yellow
diff_add = green
diff_remove = red
diff_lines = cyan
