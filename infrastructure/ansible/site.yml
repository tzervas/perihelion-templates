---
# Main playbook for server security hardening

- name: Apply security hardening to all servers
  hosts: all
  become: yes
  roles:
    - base_security

- name: Configure web servers
  hosts: web_servers
  become: yes
  roles:
    - web_security

- name: Configure database servers
  hosts: database_servers
  become: yes
  roles:
    - database_security
