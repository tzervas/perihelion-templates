apiVersion: v1
kind: ServiceAccount
metadata:
  name: argocd-restricted-sa
  namespace: argocd
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: argocd-restricted-role
  namespace: argocd
rules:
  - apiGroups:
      - argoproj.io
    resources:
      - applications
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - argoproj.io
    resources:
      - appprojects
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argocd-restricted-role-binding
  namespace: argocd
subjects:
  - kind: ServiceAccount
    name: argocd-restricted-sa
    namespace: argocd
roleRef:
  kind: Role
  name: argocd-restricted-role
  apiGroup: rbac.authorization.k8s.io
