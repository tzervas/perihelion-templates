name: Lit CI

on:
  push:
    branches: [ main ]
    paths:
      - 'frontend/lit/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'frontend/lit/**'

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/lit/package-lock.json
    
    - name: Install dependencies
      working-directory: frontend/lit
      run: npm ci
    
    - name: Lint
      working-directory: frontend/lit
      run: npm run lint
    
    - name: Analyze custom elements
      working-directory: frontend/lit
      run: npm run analyze
    
    - name: Test
      working-directory: frontend/lit
      run: npm run test:coverage
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        directory: frontend/lit/coverage
        flags: lit

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/lit/package-lock.json
    
    - name: Install dependencies
      working-directory: frontend/lit
      run: npm ci
    
    - name: Build
      working-directory: frontend/lit
      run: npm run build
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dist
        path: frontend/lit/dist/

  storybook:
    name: Build Storybook
    runs-on: ubuntu-latest
    needs: [test]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/lit/package-lock.json
    
    - name: Install dependencies
      working-directory: frontend/lit
      run: npm ci
    
    - name: Build Storybook
      working-directory: frontend/lit
      run: npm run build-storybook
    
    - name: Upload Storybook build
      uses: actions/upload-artifact@v4
      with:
        name: storybook
        path: frontend/lit/storybook-static/

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [build]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Run Snyk to check for vulnerabilities
      uses: snyk/actions/node@master
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      with:
        args: --severity-threshold=high
