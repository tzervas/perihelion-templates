name: Svelte CI

on:
  push:
    branches: [ main ]
    paths:
      - 'frontend/svelte/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'frontend/svelte/**'

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/svelte/package-lock.json
    
    - name: Install dependencies
      working-directory: frontend/svelte
      run: npm ci
    
    - name: Type check
      working-directory: frontend/svelte
      run: npm run check
    
    - name: Lint
      working-directory: frontend/svelte
      run: npm run lint
    
    - name: Test
      working-directory: frontend/svelte
      run: npm run test:coverage
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        directory: frontend/svelte/coverage
        flags: svelte

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/svelte/package-lock.json
    
    - name: Install dependencies
      working-directory: frontend/svelte
      run: npm ci
    
    - name: Build
      working-directory: frontend/svelte
      run: npm run build
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dist
        path: frontend/svelte/build/

  storybook:
    name: Build Storybook
    runs-on: ubuntu-latest
    needs: [test]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/svelte/package-lock.json
    
    - name: Install dependencies
      working-directory: frontend/svelte
      run: npm ci
    
    - name: Build Storybook
      working-directory: frontend/svelte
      run: npm run build-storybook
    
    - name: Upload Storybook build
      uses: actions/upload-artifact@v4
      with:
        name: storybook
        path: frontend/svelte/storybook-static/

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [build]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Run Snyk to check for vulnerabilities
      uses: snyk/actions/node@master
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      with:
        args: --severity-threshold=high
