name: Angular CI

on:
  push:
    branches: [ main ]
    paths:
      - 'frontend/angular/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'frontend/angular/**'

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/angular/package-lock.json
    
    - name: Install dependencies
      working-directory: frontend/angular
      run: npm ci
    
    - name: Lint
      working-directory: frontend/angular
      run: npm run lint
    
    - name: Test
      working-directory: frontend/angular
      run: npm test
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        directory: frontend/angular/coverage
        flags: angular

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/angular/package-lock.json
    
    - name: Install dependencies
      working-directory: frontend/angular
      run: npm ci
    
    - name: Build
      working-directory: frontend/angular
      run: npm run build
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dist
        path: frontend/angular/dist/

  storybook:
    name: Build Storybook
    runs-on: ubuntu-latest
    needs: [test]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/angular/package-lock.json
    
    - name: Install dependencies
      working-directory: frontend/angular
      run: npm ci
    
    - name: Build Storybook
      working-directory: frontend/angular
      run: npm run build-storybook
    
    - name: Upload Storybook build
      uses: actions/upload-artifact@v4
      with:
        name: storybook
        path: frontend/angular/storybook-static/

  docs:
    name: Generate Documentation
    runs-on: ubuntu-latest
    needs: [test]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/angular/package-lock.json
    
    - name: Install dependencies
      working-directory: frontend/angular
      run: npm ci
    
    - name: Generate Compodoc documentation
      working-directory: frontend/angular
      run: npm run compodoc
    
    - name: Upload documentation
      uses: actions/upload-artifact@v4
      with:
        name: documentation
        path: frontend/angular/documentation/

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [build]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Run Snyk to check for vulnerabilities
      uses: snyk/actions/node@master
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      with:
        args: --severity-threshold=high
